name: build-and-release
run-name: Testing and Releasing libcma
on: [push, workflow_dispatch]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: Main

    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Ubuntu
        run: |
          make third-party
          make docker ARGS="test"

  build-platforms:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        images:
          - image: ubuntu
            plat: glibc
          - image: alpine
            plat: musl

    steps:
      - name: Set Envs
        run: |
          echo "VERSION=${GITHUB_REF##*/v}" >> "$GITHUB_ENV"
          echo "TOOLS_TARGZ=${{ vars.TOOLS_TARGZ || 'machine-asset-tools' }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        run: |
          mkdir -p artifacts
          ls -la artifacts
          make third-party-boost
          make docker DOCKERFILE=${{ matrix.images.image }}.dockerfile ARGS="tar-files" VERSION=${{ env.VERSION }}
          ls -la build/_tar
          cp build/_tar/machine-asset-tools.tar.gz     artifacts/${{ env.TOOLS_TARGZ }}_${{ matrix.images.plat }}_riscv64_v${{ env.VERSION }}.tar.gz
          cp build/_tar/machine-asset-tools-dev.tar.gz artifacts/${{ env.TOOLS_TARGZ }}_${{ matrix.images.plat }}_riscv64_dev_v${{ env.VERSION }}.tar.gz

      - name: Build Deb
        if: ${{ matrix.images.image == 'ubuntu' }}
        run: |
          make docker DOCKERFILE=ubuntu.dockerfile ARGS="deb" VERSION=${{ env.VERSION }}
          cp build/_deb/machine-asset-tools_riscv64.deb artifacts/${{ env.TOOLS_TARGZ }}_riscv64_v${{ env.VERSION }}.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cma-${{ matrix.images.plat }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-platforms
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Setup
        run: |
          mkdir -p ${{ runner.temp }}/artifacts

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts
          pattern: cma-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: ${{ runner.temp }}/artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tools:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    environment: Main
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Download Cartesi machine
        run: |
          wget https://github.com/cartesi/machine-emulator/releases/download/v${{ vars.MACHINE_EMULATOR_VERSION }}/machine-emulator_${{ matrix.arch }}.deb
          sudo apt-get update
          sudo apt-get install -y ./machine-emulator_${{ matrix.arch }}.deb

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: 14
          platform: x64

      - uses: actions/checkout@v4

      - name: setup
        run: |
          make third-party MACHINE_EMULATOR_VERSION=${{ vars.MACHINE_EMULATOR_VERSION }}

      - name: make tools
        run: |
          make account-driver-reader

      - name: make tar
        run: |
          mkdir -p ${{ runner.temp }}/artifacts
          cd build/tools/ && tar -zcf ${{ runner.temp }}/artifacts/tools_linux_${{ matrix.arch }}.tar.gz account-driver-reader

      - name: Upload release tools
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: ${{ runner.temp }}/artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
